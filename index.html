// shuffle helper
function shuffle(arr) {
  const a = [...arr];
  for (let i=a.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function getDaysLeft(target) {
  return Math.max(0, Math.ceil((target-new Date())/86400000));
}

async function apiGet(params) {
  const url = API_URL+"?"+new URLSearchParams(params);
  const res = await fetch(url);
  return res.json();
}

async function apiPost(body) {
  await fetch(API_URL,{method:"POST",body:JSON.stringify(body)});
}

const DEFAULT_GS = {
  xp_math:0,xp_english:0,xp_gat:0,xp_sasmo:0,
  streak:0,level:1,last_study_date:"",
  badges:"[]",correct_streak:0,total_answered:0,sasmo_count:0,
  done_math:"[]",done_english:"[]",done_gat:"[]",done_sasmo:"[]",
};

// ── APP ────────────────────────────────────────────────────────────────────
function App() {
  const [tab,setTab]=useState("home");
  const [gs,setGs]=useState(DEFAULT_GS);
  const [appLoading,setAppLoading]=useState(true);
  const [toast,setToast]=useState(null);
  const saveTimer=useRef(null);

  useEffect(()=>{
    apiGet({action:"load"}).then(res=>{
      if(res.status==="ok"&&Object.keys(res.data).length>0){
        setGs(s=>({...DEFAULT_GS,...s,...res.data}));
      }
      setAppLoading(false);
    }).catch(()=>setAppLoading(false));
  },[]);

  const showToast=(msg,color="#3B82F6")=>{
    setToast({msg,color});
    setTimeout(()=>setToast(null),2500);
  };

  const autoSave=useCallback((newGs)=>{
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>{
      apiPost({action:"save",payload:newGs});
    },1500);
  },[]);

  const updateGs=useCallback((updater)=>{
    setGs(prev=>{
      const next={...prev,...updater(prev)};
      autoSave(next);
      return next;
    });
  },[autoSave]);

  const awardXP=useCallback((subject,xpAmount,correct,answerData,questionId)=>{
    updateGs(prev=>{
      const key=`xp_${subject}`;
      const doneKey=`done_${subject}`;
      const earned=correct?xpAmount:0;
      const newSubjXp=(Number(prev[key])||0)+earned;
      const totalXp=SUBJECTS.reduce((s,sub)=>s+(Number(prev[`xp_${sub.id}`])||0),0)+earned;
      const newLevel=Math.floor(totalXp/200)+1;
      const today=new Date().toDateString();
      const yesterday=new Date(Date.now()-86400000).toDateString();
      let newStreak=Number(prev.streak)||0;
      if(prev.last_study_date!==today){
        newStreak=prev.last_study_date===yesterday?newStreak+1:1;
      }
      let badges=[];try{badges=JSON.parse(prev.badges||"[]");}catch{}
      const totalAnswered=(Number(prev.total_answered)||0)+1;
      const correctStreak=correct?(Number(prev.correct_streak)||0)+1:0;
      const sasmoCount=subject==="sasmo"?(Number(prev.sasmo_count)||0)+1:(Number(prev.sasmo_count)||0);
      if(!badges.includes("first_q")&&totalAnswered>=1)badges.push("first_q");
      if(!badges.includes("streak3")&&newStreak>=3)badges.push("streak3");
      if(!badges.includes("streak7")&&newStreak>=7)badges.push("streak7");
      if(!badges.includes("math50")&&newSubjXp>=50&&subject==="math")badges.push("math50");
      if(!badges.includes("perfect5")&&correctStreak>=5)badges.push("perfect5");
      if(!badges.includes("sasmo10")&&sasmoCount>=10)badges.push("sasmo10");

      // Track done questions
      let done=[];try{done=JSON.parse(prev[doneKey]||"[]");}catch{}
      if(questionId&&!done.includes(questionId))done.push(questionId);

      apiPost({action:"log_answer",subject,...answerData,correct,xp_earned:earned});
      return {
        [key]:newSubjXp,level:newLevel,streak:newStreak,last_study_date:today,
        badges:JSON.stringify(badges),correct_streak:correctStreak,
        total_answered:totalAnswered,sasmo_count:sasmoCount,
        [doneKey]:JSON.stringify(done),
      };
    });
  },[updateGs]);

  const totalXP=SUBJECTS.reduce((s,sub)=>s+(Number(gs[`xp_${sub.id}`])||0),0);
  const level=Math.floor(totalXP/200)+1;
  const xpInLevel=totalXP%200;
  let badges=[];try{badges=JSON.parse(gs.badges||"[]");}catch{}

  if(appLoading) return (
    <div style={{background:"#0F172A",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{fontSize:40,animation:"spin 1s linear infinite",display:"inline-block"}}>⚙️</div>
      <div style={{color:"rgba(255,255,255,0.5)",fontSize:14}}>Loading Jaeden's progress...</div>
    </div>
  );

  return (
    <div style={{fontFamily:"'Trebuchet MS','Gill Sans',sans-serif",maxWidth:440,margin:"0 auto",minHeight:"100vh",background:"#0F172A",display:"flex",flexDirection:"column"}}>
      <div style={{position:"fixed",top:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:440,height:"100vh",pointerEvents:"none",zIndex:0,background:"radial-gradient(ellipse at 50% 0%,rgba(59,130,246,0.1) 0%,transparent 60%)"}}/>
      {toast&&<div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",background:toast.color,color:"white",borderRadius:12,padding:"10px 20px",fontSize:14,fontWeight:700,zIndex:999,boxShadow:"0 4px 20px rgba(0,0,0,0.4)",whiteSpace:"nowrap"}}>{toast.msg}</div>}
      <div style={{flex:1,overflowY:"auto",position:"relative",zIndex:1,paddingBottom:70}}>
        {tab==="home"&&<HomeTab gs={gs} totalXP={totalXP} level={level} xpInLevel={xpInLevel} badges={badges}/>}
        {tab==="practice"&&<PracticeTab gs={gs} awardXP={awardXP} showToast={showToast}/>}
        {tab==="plan"&&<PlanTab/>}
        {tab==="monitor"&&<MonitorTab showToast={showToast}/>}
      </div>
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:440,background:"rgba(15,23,42,0.97)",borderTop:"1px solid rgba(255,255,255,0.08)",display:"flex",justifyContent:"space-around",padding:"8px 0 16px",zIndex:10}}>
        {[{id:"home",icon:"🏠",label:"Home"},{id:"practice",icon:"⚡",label:"Practice"},{id:"plan",icon:"📅",label:"Plan"},{id:"monitor",icon:"👁️",label:"Monitor"}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"4px 14px"}}>
            <span style={{fontSize:20}}>{t.icon}</span>
            <span style={{fontSize:10,fontWeight:700,color:tab===t.id?"#60A5FA":"rgba(255,255,255,0.3)",textTransform:"uppercase",letterSpacing:"0.05em"}}>{t.label}</span>
            {tab===t.id&&<div style={{width:4,height:4,borderRadius:"50%",background:"#60A5FA"}}/>}
          </button>
        ))}
      </div>
    </div>
  );
}

// ── PRACTICE ───────────────────────────────────────────────────────────────
function PracticeTab({gs,awardXP,showToast}){
  const [subject,setSubject]=useState(null);
  const [queue,setQueue]=useState([]);
  const [current,setCurrent]=useState(null);
  const [selected,setSelected]=useState(null);
  const [revealed,setRevealed]=useState(false);
  const [sessionCount,setSessionCount]=useState(0);

  const subj=SUBJECTS.find(s=>s.id===subject);

  const startSubject=useCallback((sid)=>{
    setSubject(sid);
    setSelected(null);setRevealed(false);setSessionCount(0);
    // Get done IDs
    let done=[];try{done=JSON.parse(gs[`done_${sid}`]||"[]");}catch{}
    // Filter out done questions
    let available=QB[sid].filter(q=>!done.includes(q.id));
    // If all done, reset pool
    if(available.length===0){
      available=[...QB[sid]];
    }
    const shuffled=shuffle(available);
    setQueue(shuffled);
    setCurrent(shuffled[0]);
  },[gs]);

  const handleSelect=(choice)=>{
    if(revealed)return;
    const correct=choice.charAt(0)===current.answer;
    setSelected(choice);
    setRevealed(true);
    awardXP(subject,current.xp,correct,{topic:current.topic,difficulty:"Standard",question:current.question,answer:choice},current.id);
    showToast(correct?`✅ Correct! +${current.xp} XP 🎉`:`❌ Wrong! Answer: ${current.answer}`,correct?"#10B981":"#EF4444");
  };

  const nextQuestion=()=>{
    const newQueue=queue.slice(1);
    setQueue(newQueue);
    setSelected(null);setRevealed(false);
    setSessionCount(c=>c+1);
    if(newQueue.length>0){
      setCurrent(newQueue[0]);
    } else {
      // All questions done in session
      setCurrent(null);
    }
  };

  if(!subject) return(
    <div style={{padding:16}}>
      <PageHeader title="⚡ Practice" subtitle="Instant questions — no waiting!"/>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {SUBJECTS.map(s=>{
          let done=[];try{done=JSON.parse(gs[`done_${s.id}`]||"[]");}catch{}
          const total=QB[s.id].length;
          const remaining=total-done.length;
          return(
            <button key={s.id} onClick={()=>startSubject(s.id)} style={{background:"rgba(255,255,255,0.04)",border:`1px solid ${s.color}33`,borderRadius:16,padding:16,display:"flex",alignItems:"center",gap:14,cursor:"pointer",textAlign:"left",width:"100%"}}>
              <div style={{width:48,height:48,borderRadius:14,background:`${s.color}22`,border:`1.5px solid ${s.color}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,color:s.color}}>{s.icon}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:16,fontWeight:700,color:"white"}}>{s.label}</div>
                <div style={{fontSize:12,color:"rgba(255,255,255,0.4)",marginTop:2}}>{remaining>0?`${remaining} questions left`:"All done! Will reset 🔄"}</div>
              </div>
              <div style={{color:s.color,fontSize:20}}>→</div>
            </button>
          );
        })}
      </div>
    </div>
  );

  if(!current) return(
    <div style={{padding:16,textAlign:"center",paddingTop:60}}>
      <div style={{fontSize:48,marginBottom:16}}>🎉</div>
      <div style={{fontSize:20,fontWeight:800,color:"white",marginBottom:8}}>All done!</div>
      <div style={{fontSize:14,color:"rgba(255,255,255,0.5)",marginBottom:24}}>You've completed all {subj?.label} questions this session.</div>
      <button onClick={()=>setSubject(null)} style={{padding:"12px 24px",background:`linear-gradient(135deg,${subj?.color},${subj?.dark})`,border:"none",borderRadius:14,color:"white",fontSize:15,fontWeight:700,cursor:"pointer"}}>Back to Subjects</button>
    </div>
  );

  return(
    <div style={{padding:16}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
        <button onClick={()=>setSubject(null)} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,padding:"6px 12px",color:"white",cursor:"pointer",fontSize:16}}>←</button>
        <div style={{fontSize:18,fontWeight:800,color:subj?.color}}>{subj?.icon} {subj?.label}</div>
        <div style={{marginLeft:"auto",fontSize:12,color:"rgba(255,255,255,0.35)"}}>{queue.length} left</div>
      </div>

      <div style={{animation:"pop 0.15s ease"}}>
        <div style={{display:"inline-block",background:`${subj?.color}22`,border:`1px solid ${subj?.color}44`,borderRadius:8,padding:"4px 10px",fontSize:11,color:subj?.color,fontWeight:700,marginBottom:12}}>
          {current.topic} · +{current.xp} XP
        </div>
        <div style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:16,padding:16,marginBottom:14,fontSize:14,color:"rgba(255,255,255,0.9)",lineHeight:1.75,whiteSpace:"pre-wrap"}}>
          {current.question}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
          {current.choices.map((c,i)=>{
            const isCorrect=c.charAt(0)===current.answer;
            const isSelected=selected===c;
            let bg="rgba(255,255,255,0.04)",border="rgba(255,255,255,0.1)",textColor="rgba(255,255,255,0.85)";
            if(revealed&&isCorrect){bg="rgba(16,185,129,0.15)";border="#10B981";textColor="#6EE7B7";}
            else if(revealed&&isSelected&&!isCorrect){bg="rgba(239,68,68,0.15)";border="#EF4444";textColor="#FCA5A5";}
            return(
              <button key={i} onClick={()=>handleSelect(c)} disabled={revealed} style={{background:bg,border:`1.5px solid ${border}`,borderRadius:12,padding:"13px 14px",textAlign:"left",color:textColor,fontSize:13,cursor:revealed?"default":"pointer",fontWeight:isSelected?700:400,width:"100%",transition:"all 0.15s"}}>
                {c}
              </button>
            );
          })}
        </div>
        {!revealed&&<div style={{textAlign:"center",fontSize:12,color:"rgba(255,255,255,0.25)",marginBottom:10}}>👆 Select an answer to continue</div>}
        {revealed&&(
          <>
            <div style={{background:"rgba(16,185,129,0.08)",border:"1px solid rgba(16,185,129,0.2)",borderRadius:14,padding:14,marginBottom:14}}>
              <div style={{fontSize:12,fontWeight:700,color:"#10B981",marginBottom:6}}>💡 Explanation</div>
              <div style={{fontSize:13,color:"rgba(255,255,255,0.75)",lineHeight:1.65}}>{current.explanation}</div>
            </div>
            <button onClick={nextQuestion} style={{width:"100%",padding:14,background:`linear-gradient(135deg,${subj?.color},${subj?.dark})`,border:"none",borderRadius:14,color:"white",fontSize:15,fontWeight:800,cursor:"pointer",boxShadow:`0 4px 16px ${subj?.color}44`}}>
              Next Question →
            </button>
          </>
        )}
      </div>
    </div>
  );
}

// ── PLAN ───────────────────────────────────────────────────────────────────
function PlanTab(){
  return(
    <div style={{padding:16}}>
      <PageHeader title="📅 Study Plan" subtitle="Mar 25 – Apr 18, 2026"/>
      {STUDY_PLAN.map((week,wi)=>(
        <div key={wi} style={{marginBottom:20}}>
          <div style={{fontSize:12,fontWeight:800,color:"#60A5FA",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10,padding:"6px 10px",background:"rgba(59,130,246,0.1)",borderRadius:8,borderLeft:"3px solid #3B82F6"}}>
            {week.week} — {week.focus}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {week.items.map((item,i)=>(
              <div key={i} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:12,padding:"10px 12px",display:"flex",gap:10,alignItems:"flex-start"}}>
                <div style={{minWidth:28,fontSize:10,fontWeight:700,color:"rgba(255,255,255,0.3)",paddingTop:2,textTransform:"uppercase"}}>{item.day}</div>
                <div style={{minWidth:28,height:28,borderRadius:8,background:`${item.color}22`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>{item.icon}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:11,fontWeight:700,color:item.color,marginBottom:2}}>{item.subject}</div>
                  <div style={{fontSize:12,color:"rgba(255,255,255,0.5)",lineHeight:1.5}}>{item.topic}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

// ── MONITOR ────────────────────────────────────────────────────────────────
function MonitorTab({showToast}){
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(true);
  const [feedback,setFeedback]=useState(null);
  const [loadingFeedback,setLoadingFeedback]=useState(false);

  useEffect(()=>{
    apiGet({action:"monitor"}).then(res=>{
      if(res.status==="ok")setData(res);
      setLoading(false);
    }).catch(()=>setLoading(false));
  },[]);

  const getFeedback=async()=>{
    if(!data)return;
    setLoadingFeedback(true);
    try{
      const res=await fetch(API_URL+"?action=feedback");
      const d=await res.json();
      if(d.status==="ok"&&d.feedback){
        setFeedback(d.feedback);
      } else {
        showToast("Couldn't load feedback","#EF4444");
      }
    }catch{showToast("Couldn't load feedback","#EF4444");}
    setLoadingFeedback(false);
  };

  if(loading) return(
    <div style={{padding:16,textAlign:"center",paddingTop:60}}>
      <div style={{fontSize:32,animation:"spin 1s linear infinite",display:"inline-block"}}>⚙️</div>
      <div style={{color:"rgba(255,255,255,0.5)",fontSize:14,marginTop:12}}>Loading...</div>
    </div>
  );

  const totalAnswers=data?.totalAnswers||0;
  const activity=data?.activity||[];
  const weakTopics=data?.weakTopics||[];
  const progress=data?.progress||{};
  const totalXP=SUBJECTS.reduce((s,sub)=>s+(Number(progress[`xp_${sub.id}`])||0),0);
  const correctTotal=activity.reduce((s,a)=>s+(Number(a.correct)||0),0);
  const accuracy=totalAnswers>0?Math.round((correctTotal/totalAnswers)*100):0;

  return(
    <div style={{padding:16}}>
      <PageHeader title="👁️ Monitor" subtitle="Parent & tutor dashboard"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:16}}>
        {[{label:"Total XP",value:totalXP,color:"#60A5FA"},{label:"Answered",value:totalAnswers,color:"#A78BFA"},{label:"Accuracy",value:`${accuracy}%`,color:accuracy>=70?"#10B981":"#F59E0B"}].map((s,i)=>(
          <div key={i} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:14,padding:"12px 8px",textAlign:"center"}}>
            <div style={{fontSize:20,fontWeight:900,color:s.color}}>{s.value}</div>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.4)",marginTop:4}}>{s.label}</div>
          </div>
        ))}
      </div>
      <Label>Last 7 Days</Label>
      <div style={{display:"flex",gap:4,marginBottom:16,alignItems:"flex-end",height:80}}>
        {activity.map((a,i)=>{
          const max=Math.max(...activity.map(x=>x.total),1);
          const h=Math.max((a.total/max)*60,a.total>0?8:2);
          const dayLabel=["Su","Mo","Tu","We","Th","Fr","Sa"][new Date(a.date).getDay()];
          return(
            <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
              <div style={{fontSize:9,color:a.xp>0?"#60A5FA":"rgba(255,255,255,0.2)",fontWeight:700}}>{a.xp>0?`+${a.xp}`:""}</div>
              <div style={{width:"100%",height:h,background:a.total>0?"#3B82F6":"rgba(255,255,255,0.06)",borderRadius:4,minHeight:2}}/>
              <div style={{fontSize:9,color:"rgba(255,255,255,0.4)"}}>{dayLabel}</div>
            </div>
          );
        })}
      </div>
      <Label>XP by Subject</Label>
      <div style={{marginBottom:16}}>
        {SUBJECTS.map(s=>{
          const xp=Number(progress[`xp_${s.id}`])||0;
          return(
            <div key={s.id} style={{marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{fontSize:13,color:"white",fontWeight:600}}>{s.icon} {s.label}</span>
                <span style={{fontSize:12,color:s.color,fontWeight:700}}>{xp} XP</span>
              </div>
              <div style={{background:"rgba(255,255,255,0.08)",borderRadius:99,height:7}}>
                <div style={{width:`${Math.min((xp/300)*100,100)}%`,height:"100%",background:s.color,borderRadius:99}}/>
              </div>
            </div>
          );
        })}
      </div>
      {weakTopics.length>0&&(
        <>
          <Label>⚠️ Weak Topics</Label>
          <div style={{marginBottom:16}}>
            {weakTopics.map((w,i)=>(
              <div key={i} style={{background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:10,padding:"8px 12px",marginBottom:6,display:"flex",justifyContent:"space-between"}}>
                <span style={{fontSize:13,color:"rgba(255,255,255,0.8)"}}>{w.topic}</span>
                <span style={{fontSize:12,color:"#FCA5A5",fontWeight:700}}>{w.wrong}x wrong</span>
              </div>
            ))}
          </div>
        </>
      )}
      <button onClick={getFeedback} disabled={loadingFeedback} style={{width:"100%",padding:14,background:"linear-gradient(135deg,#7C3AED,#3B82F6)",border:"none",borderRadius:14,color:"white",fontSize:14,fontWeight:700,cursor:"pointer",marginBottom:12,opacity:loadingFeedback?0.7:1}}>
        {loadingFeedback?"⚙️ Generating...":"🤖 Get AI Feedback Report"}
      </button>
      {feedback&&(
        <div style={{background:"rgba(139,92,246,0.08)",border:"1px solid rgba(139,92,246,0.25)",borderRadius:14,padding:16,marginBottom:16}}>
          <div style={{fontSize:12,fontWeight:700,color:"#A78BFA",marginBottom:8}}>📋 Tutor Feedback</div>
          <div style={{fontSize:13,color:"rgba(255,255,255,0.8)",lineHeight:1.7,whiteSpace:"pre-wrap"}}>{feedback}</div>
        </div>
      )}
    </div>
  );
}

function PageHeader({title,subtitle}){
  return(
    <div style={{marginBottom:18,paddingTop:8}}>
      <div style={{fontSize:22,fontWeight:900,color:"white"}}>{title}</div>
      <div style={{fontSize:12,color:"rgba(255,255,255,0.4)",marginTop:2}}>{subtitle}</div>
    </div>
  );
}
function Label({children}){
  return <div style={{fontSize:11,fontWeight:800,color:"rgba(255,255,255,0.5)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>{children}</div>;
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
